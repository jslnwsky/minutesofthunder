name: Deploy to IntegrityHost (Smart)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 2  # Get previous commit for comparison
    
    - name: Detect Changed Files
      id: changed-files
      run: |
        echo "🔍 Detecting changed files..."
        
        # Get list of changed files
        CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
        
        # Filter for web files only
        WEB_FILES=""
        for file in $CHANGED_FILES; do
          if [[ $file == "index.html" || $file == "article-template.html" || $file == "css/"* || $file == "articles/"* || $file == "tools/"* ]]; then
            WEB_FILES="$WEB_FILES $file"
          fi
        done
        
        echo "files=$WEB_FILES" >> $GITHUB_OUTPUT
        echo "📁 Web files changed: $WEB_FILES"
        
        # Set output for next steps
        if [[ -n "$WEB_FILES" ]]; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi
    
    - name: Deploy Changed Files via cURL FTP
      env:
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USER }}
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      run: |
        if [[ "${{ steps.changed-files.outputs.changed }}" == "false" ]]; then
          echo "⏭️ No web files changed, skipping deployment"
          exit 0
        fi
        
        echo "🚀 Deploying changed files via cURL FTP..."
        
        # Get the list of changed files
        WEB_FILES="${{ steps.changed-files.outputs.files }}"
        
        for file in $WEB_FILES; do
          echo "📤 Uploading $file..."
          
          # Extract directory and filename
          DIR=$(dirname "$file")
          FILENAME=$(basename "$file")
          
          # Create directory if needed and upload file
          if [[ "$DIR" == "." ]]; then
            # Root directory
            curl -T "$file" "ftp://$FTP_HOST/" --user "$FTP_USER:$FTP_PASSWORD" --ftp-create-dirs
          else
            # Subdirectory
            curl -T "$file" "ftp://$FTP_HOST/$DIR/" --user "$FTP_USER:$FTP_PASSWORD" --ftp-create-dirs
          fi
          
          echo "✅ Uploaded $file"
        done
        
        echo "🎉 Deployment completed! Uploaded files: $WEB_FILES"
        
    - name: Verify Deployment
      run: |
        if [[ "${{ steps.changed-files.outputs.changed }}" == "false" ]]; then
          echo "📊 Deployment Summary: No deployment needed"
        else
          echo "📊 Deployment Summary:"
          echo "📍 Host: ${{ secrets.FTP_HOST }}"
          echo "👤 User: ${{ secrets.FTP_USER }}"
          echo "📁 Path: / (root directory)"
          echo "📤 Files uploaded: ${{ steps.changed-files.outputs.files }}"
          echo "🌐 Website will be live at your domain"
        fi
        
    - name: Create Deployment Summary
      run: |
        if [[ "${{ steps.changed-files.outputs.changed }}" == "false" ]]; then
          echo "## ⏭️ No Deployment Needed" >> $GITHUB_STEP_SUMMARY
          echo "**Reason**: No web files changed in this commit" >> $GITHUB_STEP_SUMMARY
          echo "**Files checked**: index.html, article-template.html, css/, articles/, tools/" >> $GITHUB_STEP_SUMMARY
        else
          echo "## 🎉 Smart Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          echo "**Method**: cURL FTP (Smart - Changed Files Only)" >> $GITHUB_STEP_SUMMARY
          echo "**Host**: ${{ secrets.FTP_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "**Path**: / (root directory)" >> $GITHUB_STEP_SUMMARY
          echo "**Files uploaded**: ${{ steps.changed-files.outputs.files }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time**: $(date)" >> $GITHUB_STEP_SUMMARY
        fi
