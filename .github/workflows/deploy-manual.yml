name: Deploy to IntegrityHost (Manual Only)

on:
  workflow_dispatch:  # Manual trigger ONLY
    inputs:
      reason:
        description: 'Reason for deployment'
        required: false
        default: 'Manual deployment'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 2
    
    - name: Deploy All Files via cURL FTP
      env:
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USER }}
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      run: |
        echo "🚀 Manual deployment triggered by: ${{ github.actor }}"
        echo "📝 Reason: ${{ github.event.inputs.reason }}"
        
        # List of files to deploy
        FILES="index.html article-template.html css/modern-styles.css articles/getting-started-rc-cars.html tools/motor-comparison.html .htaccess"
        
        DEPLOYED_COUNT=0
        ERROR_COUNT=0
        
        for file in $FILES; do
          if [[ ! -f "$file" ]]; then
            echo "⚠️ File not found: $file"
            continue
          fi
          
          echo "📤 Uploading $file..."
          
          # Extract directory
          DIR=$(dirname "$file")
          
          if [[ "$DIR" == "." ]]; then
            # Root directory
            if curl -T "$file" "ftp://$FTP_HOST/" --user "$FTP_USER:$FTP_PASSWORD" --ftp-create-dirs --silent --show-error; then
              curl -Q "CHMOD 644 $(basename "$file")" "ftp://$FTP_HOST/" --user "$FTP_USER:$FTP_PASSWORD" --silent 2>/dev/null || true
              echo "✅ Uploaded $file"
              ((DEPLOYED_COUNT++))
              sleep 3  # Longer delay for manual deployment
            else
              echo "❌ Failed to upload $file"
              ((ERROR_COUNT++))
            fi
          else
            # Subdirectory
            curl -Q "MKD $DIR" "ftp://$FTP_HOST/" --user "$FTP_USER:$FTP_PASSWORD" --silent 2>/dev/null || true
            if curl -T "$file" "ftp://$FTP_HOST/$DIR/" --user "$FTP_USER:$FTP_PASSWORD" --ftp-create-dirs --silent --show-error; then
              curl -Q "CHMOD 644 $DIR/$(basename "$file")" "ftp://$FTP_HOST/" --user "$FTP_USER:$FTP_PASSWORD" --silent 2>/dev/null || true
              echo "✅ Uploaded $file"
              ((DEPLOYED_COUNT++))
              sleep 3  # Longer delay for manual deployment
            else
              echo "❌ Failed to upload $file"
              ((ERROR_COUNT++))
            fi
          fi
        done
        
        echo "🎉 Manual deployment completed!"
        echo "📊 Summary: $DEPLOYED_COUNT files uploaded, $ERROR_COUNT errors"
        
        if [[ $ERROR_COUNT -gt 0 ]]; then
          echo "❌ Deployment had $ERROR_COUNT errors"
          exit 1
        fi
