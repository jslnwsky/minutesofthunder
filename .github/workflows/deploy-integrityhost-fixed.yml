name: Deploy to IntegrityHost (Fixed Path)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Deploy to IntegrityHost via lftp (Fixed Path)
      env:
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USER }}
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        FTP_PATH: ${{ secrets.FTP_PATH }}
      run: |
        echo "🚀 Deploying MinutesofThunder to IntegrityHost (Fixed Path)..."
        
        # Install lftp
        sudo apt-get update
        sudo apt-get install -y lftp
        
        # Create lftp script with fixed path
        cat > deploy.sh << 'EOF'
        #!/bin/bash
        
        set -e
        
        FTP_HOST="$1"
        FTP_USER="$2"
        FTP_PASSWORD="$3"
        FTP_PATH="$4"
        
        echo "Connecting to $FTP_HOST..."
        echo "Uploading to root directory (not public_html/public_html)"
        
        # Use root directory instead of public_html
        lftp -c "
          set ftp:ssl-allow no
          set ftp:passive-mode on
          set ftp:list-options -a
          set cmd:fail-exit true
          open -u $FTP_USER,$FTP_PASSWORD $FTP_HOST
          cd /
          mirror --reverse --verbose --delete --parallel=4 --ignore-gid --exclude node_modules/ --exclude .git/ --exclude .github/ --exclude historical/ --exclude package*.json --exclude deploy.js --exclude SETUP_INTEGRITYHOST.md . .
          quit
        "
        
        echo "✅ Deployment completed to root directory!"
        EOF
        
        chmod +x deploy.sh
        ./deploy.sh "$FTP_HOST" "$FTP_USER" "$FTP_PASSWORD" "/"
        
    - name: Verify Deployment
      run: |
        echo "📊 Deployment Summary:"
        echo "📍 Host: ${{ secrets.FTP_HOST }}"
        echo "👤 User: ${{ secrets.FTP_USER }}"
        echo "📁 Path: / (root - fixed)"
        echo "🌐 Website will be live at your domain"
        
    - name: Create Deployment Summary
      run: |
        echo "## 🎉 Deployment Complete!" >> $GITHUB_STEP_SUMMARY
        echo "**Method**: lftp (Fixed Path)" >> $GITHUB_STEP_SUMMARY
        echo "**Host**: ${{ secrets.FTP_HOST }}" >> $GITHUB_STEP_SUMMARY
        echo "**Path**: / (root directory)" >> $GITHUB_STEP_SUMMARY
        echo "**Fix**: Removed double public_html nesting" >> $GITHUB_STEP_SUMMARY
        echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "**Time**: $(date)" >> $GITHUB_STEP_SUMMARY
