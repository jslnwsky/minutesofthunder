name: Deploy to IntegrityHost (Simple)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Deploy via cURL FTP
      env:
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USER }}
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      run: |
        echo "🚀 Deploying MinutesofThunder via cURL FTP..."
        
        # Upload index.html
        echo "Uploading index.html..."
        curl -T index.html ftp://$FTP_HOST/ --user $FTP_USER:$FTP_PASSWORD --ftp-create-dirs
        
        # Upload article-template.html
        echo "Uploading article-template.html..."
        curl -T article-template.html ftp://$FTP_HOST/ --user $FTP_USER:$FTP_PASSWORD --ftp-create-dirs
        
        # Upload CSS directory
        echo "Uploading css/modern-styles.css..."
        curl -T css/modern-styles.css ftp://$FTP_HOST/css/ --user $FTP_USER:$FTP_PASSWORD --ftp-create-dirs
        
        echo "✅ Deployment completed!"
        
    - name: Verify Deployment
      run: |
        echo "📊 Deployment Summary:"
        echo "📍 Host: ${{ secrets.FTP_HOST }}"
        echo "👤 User: ${{ secrets.FTP_USER }}"
        echo "📁 Path: / (root directory)"
        echo "🌐 Website will be live at your domain"
        
    - name: Create Deployment Summary
      run: |
        echo "## 🎉 Deployment Complete!" >> $GITHUB_STEP_SUMMARY
        echo "**Method**: cURL FTP (Simple)" >> $GITHUB_STEP_SUMMARY
        echo "**Host**: ${{ secrets.FTP_HOST }}" >> $GITHUB_STEP_SUMMARY
        echo "**Path**: / (root directory)" >> $GITHUB_STEP_SUMMARY
        echo "**Files**: index.html, article-template.html, css/modern-styles.css" >> $GITHUB_STEP_SUMMARY
        echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "**Time**: $(date)" >> $GITHUB_STEP_SUMMARY
